<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relighted — Secret</title>
<link rel="icon" type="image/jpeg" href="/favicon.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #07090C;
  --bg-elevated: #0D1014;
  --card: #111418;
  --border: #1E2329;
  --border-light: #2A323A;
  --text: #F2F5FA;
  --text-muted: #8B95A5;
  --accent: #7C8B9F;
  --accent-light: #9AABB8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridMove 25s linear infinite;
  pointer-events: none;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(60px, 60px); }
}

.bg-glow {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(124, 139, 159, 0.1), transparent 60%);
  filter: blur(60px);
  pointer-events: none;
  animation: pulse 8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
}

.container {
  text-align: center;
  z-index: 1;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 2rem;
  opacity: 0.6;
}

.icon-container {
  width: 80px;
  height: 80px;
  margin: 0 auto 2rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.icon-container svg {
  width: 32px;
  height: 32px;
  color: var(--accent-light);
}

.secret-btn {
  position: relative;
  padding: 1rem 2.5rem;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.4s ease;
  overflow: hidden;
  text-decoration: none;
  display: inline-block;
}

.secret-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}

.secret-btn:hover::before {
  transform: translateX(100%);
}

.secret-btn:hover {
  border-color: var(--accent);
  letter-spacing: 5px;
  box-shadow: 0 20px 40px -15px rgba(124, 139, 159, 0.2);
}

.footer {
  position: fixed;
  bottom: 2rem;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.7rem;
  letter-spacing: 3px;
  color: var(--text-muted);
  opacity: 0.3;
  text-transform: uppercase;
}

.nav-back {
  position: fixed;
  top: 2rem;
  left: 2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.85rem;
  transition: all 0.3s ease;
}

.nav-back:hover {
  color: var(--text);
}

.nav-back svg {
  width: 16px;
  height: 16px;
}

@media (max-width: 480px) {
  .secret-btn {
    padding: 0.8rem 2rem;
    font-size: 0.8rem;
    letter-spacing: 2px;
  }

  .nav-back {
    top: 1rem;
    left: 1rem;
  }
}
</style>
</head>

<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<a href="/" class="nav-back">
  <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  Back
</a>

<div class="container">
  <div class="icon-container">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
  </div>
  <div class="label">Restricted Area</div>
  <a href="https://only-fans.uk/xrelighted" target="_blank" class="secret-btn">Don't Press</a>
</div>

<div class="footer">Relighted — Private Node</div>

</body>
</html>
