<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Relighted</title>
<link rel="icon" type="image/jpeg" href="/favicon.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #07090C;
  --bg-elevated: #0D1014;
  --card: #111418;
  --border: #1E2329;
  --border-light: #2A323A;
  --text: #F2F5FA;
  --text-muted: #8B95A5;
  --accent: #7C8B9F;
  --accent-light: #9AABB8;
  --gradient-start: #7A8B9F;
  --gradient-end: #B4C4D4;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  opacity: 0.5;
}

.bg-gradient-1 {
  position: fixed;
  top: -20%;
  right: -20%;
  width: 50%;
  height: 50%;
  background: radial-gradient(circle, rgba(124, 139, 159, 0.08), transparent 50%);
  filter: blur(60px);
  animation: float1 20s ease-in-out infinite;
  pointer-events: none;
}

.bg-gradient-2 {
  position: fixed;
  bottom: -20%;
  left: -20%;
  width: 40%;
  height: 40%;
  background: radial-gradient(circle, rgba(45, 55, 72, 0.1), transparent 50%);
  filter: blur(60px);
  animation: float2 25s ease-in-out infinite reverse;
  pointer-events: none;
}

@keyframes float1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-20px, 20px); }
}

@keyframes float2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(20px, -20px); }
}

.container {
  text-align: center;
  z-index: 1;
  padding: 2rem;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.error-code {
  font-size: clamp(8rem, 20vw, 14rem);
  font-weight: 800;
  letter-spacing: -0.05em;
  line-height: 0.85;
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1rem;
  position: relative;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.error-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
}

.error-title {
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.error-desc {
  color: var(--text-muted);
  margin-bottom: 2.5rem;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

.btn-group {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.9rem 2rem;
  font-size: 0.95rem;
  font-weight: 600;
  border-radius: 12px;
  text-decoration: none;
  transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #687285);
  color: white;
  box-shadow: 0 4px 20px rgba(124, 139, 159, 0.25);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(124, 139, 159, 0.3);
}

.btn-secondary {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
}

.btn-secondary:hover {
  border-color: var(--border-light);
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
}

.btn svg {
  width: 18px;
  height: 18px;
}

.orbit {
  position: absolute;
  width: 300px;
  height: 300px;
  border: 1px solid rgba(124, 139, 159, 0.1);
  border-radius: 50%;
  animation: orbit 20s linear infinite;
  pointer-events: none;
}

.orbit::before {
  content: '';
  position: absolute;
  top: -5px;
  left: 50%;
  width: 10px;
  height: 10px;
  background: var(--accent);
  border-radius: 50%;
  transform: translateX(-50%);
  opacity: 0.5;
}

@keyframes orbit {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.orbit:nth-child(2) {
  width: 400px;
  height: 400px;
  animation-duration: 30s;
  animation-direction: reverse;
}

.orbit:nth-child(3) {
  width: 500px;
  height: 500px;
  animation-duration: 40s;
}

.footer-text {
  position: fixed;
  bottom: 2rem;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
  opacity: 0.5;
}

@media (max-width: 480px) {
  .btn-group {
    flex-direction: column;
    align-items: center;
  }

  .btn {
    width: 100%;
    max-width: 280px;
    justify-content: center;
  }

  .orbit {
    display: none;
  }
}
</style>
</head>

<body>
<div class="bg-grid"></div>
<div class="bg-gradient-1"></div>
<div class="bg-gradient-2"></div>

<div class="orbit"></div>
<div class="orbit"></div>
<div class="orbit"></div>

<div class="container">
  <div class="error-label">Page Not Found</div>
  <h1 class="error-code">404</h1>
  <h2 class="error-title">Lost in the Void</h2>
  <p class="error-desc">The page you're looking for doesn't exist or has been moved to another dimension.</p>
  <div class="btn-group">
    <a href="/" class="btn btn-primary">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Return Home
    </a>
    <a href="/animations" class="btn btn-secondary">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
      View Portfolio
    </a>
  </div>
</div>

<div class="footer-text">Relighted</div>
</body>
</html>
